<!-- Overlay oscuro para el fondo -->
<div class="cart-overlay" [class.active]="isOpen" (click)="closeDrawer()"></div>

<!-- Drawer lateral -->
<div class="cart-drawer" [class.open]="isOpen">
  
  <div class="drawer-header">
    <h2>🛒 Mi Carrito</h2>
    <button class="btn-close" (click)="closeDrawer()">✖</button>
  </div>

  <div class="drawer-content">
    <div class="empty-cart" *ngIf="items.length === 0">
      <div class="empty-icon">🛍️</div>
      <p>Tu carrito está vacío</p>
      <button class="btn-primary" (click)="closeDrawer()" routerLink="/catalogo">Ver productos</button>
    </div>

    <div class="cart-items" *ngIf="items.length > 0">
      <div class="cart-item" *ngFor="let item of items">
        
        <img [src]="item.producto.imagen" [alt]="item.producto.nombre" class="item-img">
        
        <div class="item-details">
          <h4>{{ item.producto.nombre }}</h4>
          <span class="item-price">S/ {{ item.producto.precio | number:'1.2-2' }}</span>
          
          <div class="item-actions">
            <div class="qty-control">
              <button (click)="disminuir(item)">-</button>
              <span>{{ item.cantidad }}</span>
              <button (click)="aumentar(item)" [disabled]="item.cantidad >= (item.producto.stockQuantity || 99)">+</button>
            </div>
            <button class="btn-delete" (click)="eliminar(item)" title="Eliminar">🗑️</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="drawer-footer" *ngIf="items.length > 0">
    <div class="total-row">
      <span>Total estimado:</span>
      <strong>S/ {{ total | number:'1.2-2' }}</strong>
    </div>
    <button class="btn-checkout" (click)="enviarPedidoWhatsApp()">
      💬 Enviar pedido por WhatsApp
    </button>
  </div>

</div>
